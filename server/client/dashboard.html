<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flowspace | Unified Dashboard</title>
  <!-- Google Fonts Inter + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #f4f9ff, #d9e9fa);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 32px 28px;
      position: relative;
      color: #132e3c;
    }

    /* Floating blur orbs – elegant login theme */
    .orb-1, .orb-2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.45;
    }
    .orb-1 {
      width: 55vw;
      height: 55vw;
      top: -15vh;
      left: -15vw;
      background: radial-gradient(circle at 30% 40%, #b3defa, #6aa9c9);
    }
    .orb-2 {
      width: 60vw;
      height: 60vw;
      bottom: -25vh;
      right: -20vw;
      background: radial-gradient(circle at 70% 60%, #d2ecf5, #7fb4ca);
    }

    /* Main glass container – refined */
    .glass-app-container {
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.05);
      transition: box-shadow 0.3s ease;
      padding: 2rem 2.2rem;
    }
    .glass-app-container:hover {
      box-shadow: 0 30px 55px -15px rgba(0, 0, 0, 0.25);
    }

    /* Typography & gradient headings */
    h1, h2, h3, .gradient-heading, .section-head h3, .brand-logo h1, .tasks-header h3 {
      background: linear-gradient(120deg, #144e63, #267c6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    /* Header – clean, neumorphic touch */
    .neo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 80px;
      padding: 12px 28px;
      margin-bottom: 32px;
      border: 1px solid rgba(38, 124, 107, 0.2);
    }
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-logo i {
      font-size: 40px;
      background: linear-gradient(135deg, #1f6e58, #2c9a88);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .brand-logo h1 {
      font-size: 2rem;
      font-weight: 800;
    }
    .role-pill {
      background: #ebf4fa;
      padding: 6px 24px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      color: #1d6f5c;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02), 0 2px 8px rgba(0,0,0,0.02);
    }
    #roleDisplay {
      font-weight: 700;
      background: #dcfce7;
      padding: 4px 16px;
      border-radius: 40px;
      color: #146b3a;
      margin-left: 6px;
    }

    /* Stats panel – minimal, crisp */
    .stats-wrapper {
      margin-bottom: 38px;
    }
    #stats {
      background: linear-gradient(115deg, #ffffff, #f8fefb);
      border-radius: 40px !important;
      padding: 20px 28px !important;
      display: flex !important;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: flex-start;
      box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
      border: 1px solid #cde3dc !important;
      font-weight: 500;
    }

    /* Dashboard grid – adaptive */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 32px;
      align-items: stretch;
    }

    /* Cards: solid yet soft */
    #adminPanel, #memberPanel, .tasks-card {
      background: white;
      border-radius: 2rem;
      transition: all 0.2s ease;
      box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.06);
      border: 1px solid #e4f0ea;
    }
    #adminPanel, #memberPanel {
      padding: 28px;
    }
    .tasks-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    #adminPanel:hover, #memberPanel:hover, .tasks-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.12);
    }

    /* Section headers with accent border */
    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 5px solid #2c9a88;
      padding-left: 20px;
      margin-bottom: 28px;
    }
    .section-head i {
      font-size: 28px;
      color: #2c9a88;
    }
    .section-head h3 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    /* Admin blocks styling */
    .admin-block {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 2px dotted #deeae5;
    }
    .admin-block h4 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1b5e4c;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Form inputs & selects – modern, rounded, focus ring */
    input, select, textarea {
      width: 100%;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-family: 'Inter', monospace;
      background: #ffffff;
      border: 1.5px solid #d4e2e8;
      border-radius: 36px;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      outline: none;
      margin-bottom: 18px;
      color: #1b3f4a;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #2c9a88;
      box-shadow: 0 0 0 4px rgba(44, 154, 136, 0.2);
      transform: scale(1.01);
    }

    /* Buttons – gradient, pill shape, lifting effect */
    button {
      background: linear-gradient(105deg, #1d7b6e, #146157);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 44px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      box-shadow: 0 6px 14px rgba(21, 87, 70, 0.2);
    }
    button:hover {
      background: linear-gradient(105deg, #156257, #0f4e41);
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(29, 123, 110, 0.3);
    }
    button:active {
      transform: translateY(1px);
    }

    /* Member information placeholder – elegant loading state */
    .member-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #f8fafc;
      border-radius: 1.5rem;
      padding: 42px 20px;
      color: #628a7c;
      font-weight: 500;
      flex-direction: column;
    }
    .member-placeholder i {
      font-size: 48px;
      opacity: 0.6;
    }
    .member-placeholder span {
      font-size: 1rem;
    }

    /* Custom stat rows (for dynamic content inside member panel) */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      font-size: 0.9rem;
    }
    .stat-row i {
      width: 28px;
      color: #2c9a88;
    }

    /* Task list – scrollable, clean spacing */
    #taskList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      overflow-y: auto;
      padding-right: 6px;
      margin: 0;
      max-height: 100%;
    }
    #taskList li {
      background: #fefefe;
      border-radius: 28px;
      padding: 18px 24px;
      border: 1px solid #e7f0ec;
      transition: all 0.2s;
    }
    #taskList li:hover {
      background: #fafefe;
      border-color: #cce4db;
      transform: translateX(6px);
    }

    /* Links style */
    a {
      color: #1c7e6f;
      text-decoration: none;
      border-bottom: 1.5px solid #b9ddd2;
      transition: color 0.2s, border-color 0.2s;
    }
    a:hover {
      color: #0e5b4f;
      border-bottom-color: #0e5b4f;
    }

    /* Right column stack – perfect vertical fill */
    .right-stack {
      display: flex;
      flex-direction: column;
      gap: 32px;
      height: 100%;
    }
    #memberPanel {
      flex-shrink: 0;
    }
    /* Ensure tasks-card fills remaining height */
    .tasks-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 250px;
    }
    .tasks-header {
      flex-shrink: 0;
      margin-bottom: 24px;
    }

    /* Task list custom scrollbar */
    #taskList::-webkit-scrollbar {
      width: 6px;
    }
    #taskList::-webkit-scrollbar-track {
      background: #eef3f0;
      border-radius: 10px;
    }
    #taskList::-webkit-scrollbar-thumb {
      background: #b9cfc4;
      border-radius: 10px;
    }
    #taskList::-webkit-scrollbar-thumb:hover {
      background: #93b7a8;
    }

    /* Responsive breakpoints (560px, 420px) – untouched logic but polished */
    @media (max-width: 1000px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
        gap: 28px;
      }
      .glass-app-container {
        padding: 1.5rem;
      }
      body {
        padding: 20px;
      }
    }
    @media (max-width: 560px) {
      .glass-app-container {
        padding: 1rem;
        border-radius: 2rem;
      }
      .section-head h3 {
        font-size: 1.4rem;
      }
      .neo-header {
        flex-direction: column;
        text-align: center;
        border-radius: 48px;
        padding: 16px;
      }
      button {
        width: 100%;
        justify-content: center;
      }
      #stats {
        flex-direction: column;
        align-items: flex-start;
      }
    }
    @media (max-width: 420px) {
      .glass-app-container {
        padding: 0.9rem;
      }
      .brand-logo h1 {
        font-size: 1.5rem;
      }
      .section-head {
        padding-left: 12px;
      }
      input, select, button {
        font-size: 0.85rem;
      }
    }

    .icon-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    hr {
      margin: 12px 0;
      border: none;
      height: 1px;
      background: #e0ede8;
    }

    /* Soft loading / member container inner refinement */
    .member-dynamic-content {
      width: 100%;
    }
  </style>
</head>
<body>

<!-- Ambient orbs -->
<div class="orb-1"></div>
<div class="orb-2"></div>

<div class="glass-app-container">
  <div class="flow-dash">
    <!-- HEADER area -->
    <div class="neo-header">
      <div class="brand-logo">
        <i class="fas fa-cubes"></i>
        <h1>Flowspace</h1>
      </div>
      <div class="role-pill">
        <i class="fas fa-user-astronaut"></i>
        <span>Role:</span>
        <span id="roleDisplay">—</span>
      </div>
    </div>

    <!-- Stats panel (fully dynamic from script) -->
    <div class="stats-wrapper">
      <div id="stats"></div>
    </div>

    <!-- MAIN GRID: left admin, right column (member + tasks) -->
    <div class="dashboard-grid">
      <!-- LEFT: Admin Panel (unchanged functionality) -->
      <div id="adminPanel">
        <div class="section-head">
          <i class="fas fa-shield-alt"></i>
          <h3>Admin Controls</h3>
        </div>
        <div class="admin-block">
          <h4><i class="fas fa-folder-plus"></i> Create Project</h4>
          <input id="projectName" placeholder="Project name" autocomplete="off">
          <button onclick="createProject()"><i class="fas fa-plus-circle"></i> Create Project</button>
        </div>
        <div class="admin-block">
          <h4><i class="fas fa-tasks"></i> Create Task</h4>
          <input id="taskTitle" placeholder="Task Title">
          <input id="description" placeholder="Task Description">
          <select id="assignedTo">
            <option value="">Select User</option>
          </select>
          <select id="projectId">
            <option value="">Select Project</option>
          </select>
          <input type="date" id="deadline">
          <button onclick="createTask()"><i class="fas fa-check-double"></i> Add Task</button>
        </div>
      </div>

      <!-- RIGHT COLUMN: Member Workspace + All Tasks (clean vertical fill) -->
      <div class="right-stack">
        <!-- Member panel: script will inject user-specific data (placeholder shown until JS loads) -->
        

        <!-- All Tasks Card – fully scrollable, fills remaining height -->
        <div class="tasks-card">
          <div class="tasks-header">
            <div style="display: flex; align-items: center; gap: 12px; border-left: 5px solid #2c9a88; padding-left: 20px;">
              <i class="fas fa-list-check" style="font-size: 28px; color:#2c9a88;"></i>
              <h3 style="background: linear-gradient(120deg, #144e63, #267c6b); background-clip: text; -webkit-background-clip: text; color: transparent;">All Tasks</h3>
            </div>
          </div>
          <ul id="taskList">
            <!-- tasks injected by script.js -->
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- External script (full original behavior preserved) -->
<script src="script.js"></script>


</body>
</html>
