<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login · Workspace</title>
  <!-- Google Fonts: Inter + modern system font stack -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #f4f9ff, #d9e9fa);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      isolation: isolate;
    }

    /* abstract organic shapes — pure aesthetic (same as signup design) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 15% 40%, rgba(45, 125, 145, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 85% 70%, rgba(80, 165, 135, 0.08) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1, .orb-2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }
    .orb-1 {
      width: 50vmax;
      height: 50vmax;
      background: radial-gradient(circle, #6ac1cf, #2c7f96);
      top: -20vh;
      right: -15vw;
    }
    .orb-2 {
      width: 45vmax;
      height: 45vmax;
      background: radial-gradient(circle, #97cfb0, #469a82);
      bottom: -25vh;
      left: -10vw;
    }

    /* clean centered card — exactly matching the signup form design */
    .login-container {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(156, 200, 210, 0.2);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
      position: relative;
      z-index: 2;
    }

    .login-container:hover {
      box-shadow: 0 32px 60px -18px rgba(0, 0, 0, 0.25);
    }

    /* unified form panel — same padding and structure as signup */
    .form-panel {
      padding: 2.8rem 2.5rem;
      background: #ffffff;
    }

    .form-header {
      margin-bottom: 2rem;
      text-align: left;
    }

    .form-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(120deg, #144e63, #267c6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .form-header p {
      font-size: 0.85rem;
      color: #5f7f94;
      border-left: 3px solid #3e9f8b;
      padding-left: 0.7rem;
      font-weight: 460;
    }

    /* input groups — IDs untouched: email, password */
    .input-row {
      margin-bottom: 1.35rem;
    }

    .input-row label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #2c6b64;
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1.2rem;
      font-size: 0.95rem;
      font-family: 'Inter', monospace;
      background: #ffffff;
      border: 1.5px solid #e2edf2;
      border-radius: 36px;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      outline: none;
      color: #1e3a4a;
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    input:focus {
      border-color: #2c9a88;
      box-shadow: 0 4px 14px rgba(44, 154, 136, 0.15), 0 0 0 4px rgba(44, 154, 136, 0.08);
      transform: scale(1.01);
    }

    input::placeholder {
      color: #bdd3df;
      font-weight: 440;
    }

    /* button — preserves onclick="login()" exactly */
    .login-btn {
      background: linear-gradient(105deg, #1d7b6e 0%, #146157 100%);
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 1.5rem;
      width: 100%;
      border-radius: 44px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      margin: 0.5rem 0 1rem 0;
      box-shadow: 0 8px 18px rgba(25, 111, 107, 0.25);
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      background: linear-gradient(105deg, #146157, #0d4941);
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(25, 111, 107, 0.35);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    .legal-note {
      text-align: center;
      font-size: 0.68rem;
      color: #6f95ab;
      font-weight: 500;
      margin-top: 0.2rem;
    }

    .signup-redirect {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #4a758b;
    }

    .signup-redirect a {
      color: #1c7e6f;
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1.5px solid rgba(28, 126, 111, 0.25);
      transition: all 0.2s;
    }

    .signup-redirect a:hover {
      color: #0c5c50;
      border-bottom-color: #0c5c50;
    }

    /* responsive — same breakpoints as signup design */
    @media (max-width: 560px) {
      body {
        padding: 1rem;
      }
      .form-panel {
        padding: 2rem 1.5rem;
      }
      .form-header h1 {
        font-size: 1.8rem;
      }
      input {
        padding: 0.7rem 1rem;
      }
      .login-btn {
        padding: 0.75rem;
      }
    }

    @media (max-width: 420px) {
      .form-panel {
        padding: 1.5rem 1.2rem;
      }
    }

    /* entrance animation */
    .login-container {
      animation: cardLift 0.5s cubic-bezier(0.15, 0.9, 0.25, 1);
    }

    @keyframes cardLift {
      0% {
        opacity: 0;
        transform: translateY(28px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>

<div class="orb-1"></div>
<div class="orb-2"></div>

<div class="login-container">
  <div class="form-panel">
    <div class="form-header">
      <h1>Welcome back</h1>
      <p>Sign in to your workspace</p>
    </div>

    <!-- Email field: original ID="email" preserved -->
    <div class="input-row">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="hello@workspace.com" autocomplete="email">
    </div>

    <!-- Password field: original ID="password" preserved -->
    <div class="input-row">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="··········" autocomplete="current-password">
    </div>

    <!-- LOGIN BUTTON: unmodified onclick="login()" triggers same external script logic -->
    <button class="login-btn" onclick="login()">Login →</button>

    <div class="legal-note">Secure, encrypted access for your team</div>
    <div class="signup-redirect">Don't have an account? <a href="signup.html">Sign up</a></div>
  </div>
</div>

<!-- external script.js — keeps all original validation, login logic untouched -->
<script src="script.js"></script>

</body>
</html>
